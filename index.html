<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=Literata:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1424; --paper:#FBF2E7; --rose-deep:#8C4550; --star:#EFE6FF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;touch-action:manipulation;}
  body{
    background:radial-gradient(ellipse at 20% -10%, #33254a 0%, transparent 55%),
               radial-gradient(ellipse at 90% 110%, #241a38 0%, transparent 55%), var(--ink);
    min-height:100vh;font-family:'Literata',serif;color:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:32px 16px;overflow-x:hidden;
  }
  .bgstars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .bgstars span{position:absolute;width:3px;height:3px;background:rgba(255,255,255,.35);border-radius:50%;animation:tw 4s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.7}}

  .stage{width:100%;max-width:400px;position:relative;z-index:1;}
  .hide{display:none !important;}

  /* ---------- LANDING ---------- */
  #landing{display:flex;align-items:center;justify-content:center;min-height:80vh;}
  .welcome-note{
    background:var(--paper);border-radius:22px;padding:46px 38px;max-width:340px;
    text-align:center;transform:rotate(-3deg);box-shadow:0 30px 60px -18px rgba(0,0,0,.55);
  }
  .welcome-note .eyebrow{font-family:'Caveat',cursive;color:var(--rose-deep);font-size:20px;margin:0 0 6px;}
  .welcome-note h1{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:clamp(24px,6vw,30px);color:#3a2c22;margin:0 0 14px;line-height:1.25;}
  .welcome-note p.desc{font-family:'Literata',serif;font-size:14.5px;color:#8a7360;line-height:1.6;margin:0 0 26px;}
  button.enter{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:16px;background:var(--rose-deep);color:#FBF2E7;border:none;padding:12px 30px;border-radius:30px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(140,69,80,.6);transition:transform .15s;}
  button.enter:hover{transform:translateY(-1px);}

  /* ---------- SLIDES ---------- */
  #slides{display:flex;flex-direction:column;align-items:center;gap:20px;}

  .dots{display:flex;gap:7px;justify-content:center;margin-bottom:2px;}
  .dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .2s;}
  .dots span.active{background:#fff;}

  .night-note{
    position:relative;width:100%;border-radius:26px;padding:36px 28px;
    box-shadow:0 30px 60px -16px rgba(0,0,0,.65), inset 0 0 60px rgba(255,255,255,.05);
    overflow:hidden;
  }
  .night-note .glitter{position:absolute;inset:0;pointer-events:none;}
  .night-note .glitter span{position:absolute;border-radius:50%;background:var(--star);animation:glim 2.6s ease-in-out infinite;}
  @keyframes glim{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}
  .night-note .eyebrow{position:relative;font-family:'Caveat',cursive;font-size:19px;margin:0 0 10px;opacity:.85;}
  .night-note p.msg{position:relative;font-family:'Literata',serif;font-size:16.5px;line-height:1.85;color:#F5F1FF;margin:0;outline:none;}
  .night-note p.msg:empty::before{content:attr(data-placeholder);color:rgba(245,241,255,.4);font-style:italic;}

  .kitten-wrap{position:relative;margin-top:18px;display:flex;justify-content:center;opacity:0;animation:kittenIn .6s ease forwards;animation-delay:.1s;}
  @keyframes kittenIn{from{opacity:0;transform:translateY(10px) rotate(-4deg) scale(.9);}to{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}}
  .kitten-photo{
    width:150px;height:auto;object-fit:contain;cursor:pointer;
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.45));
    animation:kittenIdle 3.2s ease-in-out infinite;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  }
  @keyframes kittenIdle{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}
  .kitten-photo.boop{animation:none !important;transform:scale(1.15) rotate(-6deg) !important;}

  /* color themes */
  .c1{background:linear-gradient(160deg,#1B2A52 0%,#0E1630 100%);} .c1 .eyebrow{color:#B9C6F5;}
  .c2{background:linear-gradient(160deg,#3A2050 0%,#170E24 100%);} .c2 .eyebrow{color:#D9B9F0;}
  .c3{background:linear-gradient(160deg,#103B3A 0%,#081F1E 100%);} .c3 .eyebrow{color:#A7E3D8;}
  .c4{background:linear-gradient(160deg,#4A1620 0%,#200A0E 100%);} .c4 .eyebrow{color:#F0B4BE;}
  .c5{background:linear-gradient(160deg,#16321F 0%,#0A190F 100%);} .c5 .eyebrow{color:#B7DDB4;}
  .c6{background:linear-gradient(160deg,#241B4A 0%,#0C0818 100%);} .c6 .eyebrow{color:#CBB9F5;}

  /* ---------- PHOTO BOX ---------- */
  .photo-box{
    width:100%;aspect-ratio:4/3;border-radius:22px;position:relative;overflow:hidden;
    cursor:pointer;box-shadow:0 20px 44px -16px rgba(0,0,0,.55);
    user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;
  }
  .photo-box .cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s ease;}
  .photo-box .cover .icon{width:46px;height:46px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;}
  .photo-box .cover .label{font-family:'Caveat',cursive;font-size:19px;color:#EDE3FF;}
  .photo-box .hold-fill{position:absolute;left:0;bottom:0;height:4px;background:#fff;width:0%;transition:width .05s linear;}
  .photo-box img,.photo-box video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.12);transition:opacity .6s ease, transform .6s cubic-bezier(.34,1.56,.64,1);}
  .photo-box video{background:#000;}
  .photo-box.revealed .cover{opacity:0;pointer-events:none;}
  .photo-box.revealed .active-media{opacity:1;transform:scale(1);}

  /* ---------- NEXT BUTTON ---------- */
  .slide-content{width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;
    transition:opacity .32s ease, transform .32s ease;}
  .slide-content.transitioning{opacity:0;transform:translateY(18px) scale(.96);}

  button.next-slide{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:15px;
    background:transparent;color:#F5F1FF;border:1px solid rgba(245,241,255,.35);
    padding:11px 26px;border-radius:30px;cursor:pointer;margin-top:2px;
    transition:background .15s, transform .1s;
  }
  button.next-slide:hover{background:rgba(255,255,255,.08);}
  .btn-row{display:flex;gap:12px;justify-content:center;align-items:center;width:100%;}
  button.back-slide{
    font-family:'Literata',serif;font-size:14px;background:transparent;color:rgba(245,241,255,.6);
    border:1px solid rgba(245,241,255,.25);padding:11px 20px;border-radius:30px;cursor:pointer;
    transition:background .15s, color .15s;
  }
  button.back-slide:hover{background:rgba(255,255,255,.06);color:#F5F1FF;}
  button.back-slide:disabled{opacity:.3;cursor:default;}
  .next-wrap{position:relative;width:100%;display:flex;justify-content:center;min-height:52px;align-items:center;}
  .hint{font-family:'Caveat',cursive;color:#C9BCE0;font-size:16px;margin-top:2px;text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="bgstars" id="bgstars"></div>
<div class="stage">

  <!-- ===== LANDING ===== -->
  <div id="landing">
    <div class="welcome-note">
      <p class="eyebrow">hey, come in</p>
      <h1>i made you<br>something small</h1>
      <p class="desc">it won't take long, and it's better if you just see it.</p>
      <button class="enter" id="enterBtn">enter</button>
    </div>
  </div>

  <!-- ===== SLIDES ===== -->
  <div id="slides" class="hide">
    <div class="slide-content" id="slideContent">
      <div class="night-note" id="noteCard">
        <div class="glitter" id="noteGlitter"></div>
        <p class="msg" id="noteText" contenteditable="true"></p>
        <div class="kitten-wrap hide" id="kittenWrap"></div>
      </div>

      <div class="photo-box hide" id="photoBox">
        <div class="glitter" id="photoGlitter"></div>
        <div class="hold-fill" id="holdFill"></div>
        <div class="cover">
          <div class="label" id="photoLabel">tap for a surprise</div>
        </div>
        <img id="photoImg" alt="">
        <video id="photoVideo" controls playsinline preload="metadata"></video>
      </div>

      <div class="btn-row">
        <button class="back-slide" id="backBtn">← back</button>
        <div class="next-wrap">
          <button class="next-slide" id="nextBtn">next →</button>
        </div>
      </div>
      <p class="hint" id="hint"></p>
    </div>
  </div>

</div>

<script>
  function scatter(container, count){
    container.innerHTML='';
    for(let i=0;i<count;i++){
      const s=document.createElement('span');
      const size=Math.random()*2+1.5;
      s.style.width=size+'px'; s.style.height=size+'px';
      s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
      s.style.animationDelay=(Math.random()*2.6)+'s';
      container.appendChild(s);
    }
  }
  scatter(document.getElementById('bgstars'), 40);

  // six kawaii cat illustrations (Pixabay Content License — free to use, no attribution required), matching the reference style
  const kittenPhotos = [
    'https://cdn.pixabay.com/photo/2018/09/25/11/02/kitten-baby-3701939_640.png',
    'https://cdn.pixabay.com/photo/2020/07/11/21/46/kawaii-5395394_640.png',
    'https://cdn.pixabay.com/photo/2020/02/13/04/54/cat-4844480_640.png',
    'https://cdn.pixabay.com/photo/2023/04/15/17/19/cat-7928232_640.png',
    'https://cdn.pixabay.com/photo/2020/02/28/19/35/cat-4888355_640.png',
    'https://cdn.pixabay.com/photo/2020/07/03/22/05/cat-5367741_640.png',
  ];
  const kittens = kittenPhotos.map(url => `<img src="${url}" alt="a little kitten" class="kitten-photo">`);

  const kittenWrap = document.getElementById('kittenWrap');
  kittenWrap.addEventListener('click', ()=>{
    const img = kittenWrap.querySelector('.kitten-photo');
    if(!img) return;
    img.classList.add('boop');
    setTimeout(()=>img.classList.remove('boop'), 250);
  });

  // =====================================================================
  // SLIDE CONTENT — this is the only part you need to edit.
  // Every slide is one { ... } entry below. To write your paragraph for
  // a slide, edit the text inside its  placeholder:'...'  — that's the
  // message that shows up on that slide. Keep the quotes around it.
  // =====================================================================
  const slides = [

    // ---- Slide 1 ----
    {
      color:'c1',
      // right paragraph here
      placeholder:'hey... yeah you. before anything else — a small kitten for you.',
      photo:false, kitten:0
    },

    // ---- Slide 2 (has a surprise box → uses /photos/photo1.jpg, see surpriseMedia list below) ----
    {
      color:'c2',
      // right paragraph here
      placeholder:'Nittyaa, you are a great friend, pata nahi jhagda karke bhi tere se bat hoti hai toh accha lagta hai. i love you bestie.Like you know you are the best.',
      photo:true
    },

    // ---- Slide 3 (patience test: needs 3 taps of "next") ----
    {
      color:'c3',
      // right paragraph here
      placeholder:'Thoda sa patience rakh and next daba. ',
      photo:false, trickNext:3, kitten:1
    },

    // ---- Slide 4 (surprise revealed by press-and-hold → /photos/photo2.jpg) ----
    {
      color:'c4',
      // right paragraph here
      placeholder:'Ur soooo energetic bhai matlab agar koi udas insan tere se mil le toh wo khush ho jaye. and Sorry jhagadne ke liye. and and and ab toh mera licence bhi aa jayega toh apan jayege bahar ghumne  ',
      photo:true, holdReveal:true
    },

    // ---- Slide 5 (next button is locked for a few seconds first) ----
    {
      color:'c5',
      // right paragraph here
      placeholder:'bas thoda aur ......',
      photo:false, delaySeconds:5, kitten:2
    },

    // ---- the "End" sequence: pressing "End" 3 times moves to the next of these, six total ----

    // ---- Slide 6 ----
    {
      color:'c6',
      // right paragraph here
      placeholder:'hmmmm. agar mai advice du to its bohot aage ja like naye connections bana and opportunity grab kar, apne jhagde me time waste mat kar.',
      photo:false, trickNext:3, endButton:true, kitten:3
    },

    // ---- Slide 7 ----
    {
      color:'c1',
      // right paragraph here
      placeholder:"Ummmm u changed me from introvert to extrovert uske liye thankyou. and thing u told me that 'meko tere bare me ek chiz bhi nahi pata' toh wo thik ho jayega ",
      photo:false, trickNext:3, endButton:true, kitten:4
    },

    // ---- Slide 8 (surprise → /photos/photo3.jpg) ----
    {
      color:'c2',
      // right paragraph here
      placeholder:"you're doing great, like damn aur kya hi bolu tere liye bas enjoy kar. ik teko aise bhich me bura laga tha and teko thik nahi tha isiliye tu mere bday pr nahi aai its ok dude ratko aai thi na bas ho gaya fir ",
      photo:true, trickNext:3, endButton:true
    },

    // ---- Slide 9 (surprise → /photos/photo4.jpg) ----
    {
      color:'c3',
      // right paragraph here
      placeholder:'dhek ig ab everything is normal between us, soo i was thinking if u free next thursday apan jate kahi bahar',
      photo:true, trickNext:3, endButton:true
    },

    // ---- Slide 10 ----
    {
      color:'c4',
      // right paragraph here
      placeholder:'Dhek teko wo mini camera chaiye tha na, teko mil jayega mere taraf se ',
      photo:false, trickNext:3, endButton:true, kitten:5
    },

    // ---- Slide 11 (end of the first "End" sequence — surprise → /photos/photo5.jpg) ----
    {
      color:'c5',
      // right paragraph here
      placeholder:"ab thodi complains hai apki ",
      photo:true, trickNext:3, endButton:true
    },

    // ---- from here on: plain single-tap "End" slides, no patience test, one per paragraph+surprise ----

    // ---- Slide 12 (surprise → /photos/photo6.jpg) ----
    {
      color:'c6',
      // right paragraph here
      placeholder:'appka chat par mood alag and milte time alag hota hai like ap chat par khush lagte ho and milne ke time par chid chide ',
      photo:true, endButton:true
    },

    // ---- Slide 13 (surprise → /photos/photo7.jpg) ----
    {
      color:'c1',
      // right paragraph here
      placeholder:'I dont have problem with anyone you talk bas kabhi kabhi mera suna kar ',
      photo:true, endButton:true
    },

    // ---- Slide 14 (surprise → /photos/photo8.jpg) ----
    {
      color:'c2',
      // right paragraph here
      placeholder:'You dont laugh more with me. Bas ab problems khatam ',
      photo:true, endButton:true
    },

    // ---- Slide 15 (surprise → /photos/photo9.jpg) ----
    {
      color:'c3',
      // right paragraph here
      placeholder:'kisne bola u are not my bestie, you are and you have no option',
      photo:true, endButton:true
    },

    // ---- Slide 16 (surprise → /photos/photo10.jpg) ----
    {
      color:'c4',
      // right paragraph here
      placeholder:'And you were right i get jealous sometimes.',
      photo:true, endButton:true
    },

    // ---- Slide 17 (surprise → /photos/photo11.jpg) ----
    {
      color:'c5',
      // right paragraph here
      placeholder:'chad. I honour you for converting mr and making me extrovert...',
      photo:true, endButton:true
    },

    // ---- Slide 18 (surprise → /photos/photo12.jpg) ----
    {
      color:'c6',
      // right paragraph here
      placeholder:'You are a cutie, and.... ',
      photo:true, endButton:true
    },

    // ---- Slide 19 (surprise → /photos/photo13.jpg — can be a video file instead, see note below) ----
    {
      color:'c1',
      // right paragraph here
      placeholder:'Bas i should stop speaking.. enjoy ',
      photo:true, endButton:true
    },

    // ---- Slide 20 (surprise → /photos/photo14.jpg) ----
    {
      color:'c2',
      // right paragraph here
      placeholder:'second last surprise.',
      photo:true, endButton:true
    },

    // ---- Slide 21 — the true final slide (surprise → /photos/photo15.jpg) ----
    {
      color:'c3',
      // right paragraph here
      placeholder:"that's it. for real this time.",
      photo:true, endButton:true, isLast:true
    },
  ];

  // =====================================================================
  // SURPRISE MEDIA — one entry per photo-box slide above, in order.
  // Just upload your files into a /photos folder in this same repo,
  // matching these filenames (or edit the paths here to whatever you
  // actually name them). Works for images (.jpg/.png/.webp) and videos
  // (.mp4/.webm/.mov) — the code detects which one automatically.
  // =====================================================================
  const surpriseMedia = [
    '/photos/photo1.jpg',
    '/photos/photo2.jpg',
    '/photos/photo3.jpg',
    '/photos/photo4.jpg',
    '/photos/photo5.jpg',
    '/photos/photo6.jpg',
    '/photos/photo7.jpg',
    '/photos/photo8.jpg',
    '/photos/photo9.jpg',
    '/photos/photo10.jpg',
    '/photos/photo11.jpg',
    '/photos/photo12.jpg',
    '/photos/photo13.jpg',
    '/photos/photo14.jpg',
    '/photos/photo15.jpg',
  ];

  let idx = 0;
  let tapCount = 0;
  let holdTimer = null;
  let holdProgress = 0;
  const revealedPhotoSlides = new Set();
  const photoSlideIndexes = slides
    .map((slide, slideIndex) => slide.photo ? slideIndex : -1)
    .filter(slideIndex => slideIndex >= 0);

  const noteCard=document.getElementById('noteCard');
  const noteEyebrow=document.getElementById('noteEyebrow');
  const noteText=document.getElementById('noteText');
  const noteGlitter=document.getElementById('noteGlitter');
  const photoBox=document.getElementById('photoBox');
  const photoGlitter=document.getElementById('photoGlitter');
  const photoImg=document.getElementById('photoImg');
  const photoVideo=document.getElementById('photoVideo');
  const photoLabel=document.getElementById('photoLabel');
  const holdFill=document.getElementById('holdFill');
  const nextBtn=document.getElementById('nextBtn');
  const backBtn=document.getElementById('backBtn');
  const hint=document.getElementById('hint');
  const slideContent=document.getElementById('slideContent');

  function photoSlotForSlide(slideIndex){
    return photoSlideIndexes.indexOf(slideIndex);
  }

  function updatePhotoLabel(s){
    if(!s.photo) return;
    photoLabel.textContent = s.holdReveal ? 'press and hold for a surprise' : 'tap for a surprise';
  }

  function isVideoFile(src){
    return /\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(src);
  }

  function clearSurpriseMedia(){
    photoImg.removeAttribute('src');
    photoImg.classList.remove('active-media');
    photoVideo.pause();
    photoVideo.removeAttribute('src');
    photoVideo.classList.remove('active-media');
    photoVideo.load();
  }

  function showSurpriseMedia(src){
    clearSurpriseMedia();
    if(isVideoFile(src)){
      photoVideo.src = src;
      photoVideo.classList.add('active-media');
      const play = photoVideo.play();
      if(play) play.catch(()=>{});
      return;
    }
    photoImg.src = src;
    photoImg.classList.add('active-media');
  }

  function revealCurrentPhoto(){
    const slot = photoSlotForSlide(idx);
    if(slot < 0 || photoBox.classList.contains('revealed')) return;
    const media = surpriseMedia[slot];
    if(!media){
      hint.textContent = `add media ${slot + 1} in /photos first`;
      updatePhotoLabel(slides[idx]);
      return;
    }
    showSurpriseMedia(media);
    revealedPhotoSlides.add(idx);
    photoBox.classList.add('revealed');
    holdFill.style.width = '100%';
    hint.textContent = '';
  }

  function transitionToSlide(newIdx){
    slideContent.classList.add('transitioning');
    setTimeout(()=>{
      idx = newIdx;
      renderSlide();
      void slideContent.offsetWidth; // reflow so the removal below animates back in
      slideContent.classList.remove('transitioning');
    }, 300);
  }

  function renderSlide(){
    const s = slides[idx];
    tapCount = 0; holdProgress = 0;
    clearInterval(holdTimer);

    // colours
    noteCard.className = 'night-note ' + s.color;
    photoBox.className = 'photo-box hide ' + s.color;
    if(s.photo) photoBox.classList.remove('hide');
    photoBox.classList.remove('revealed');
    clearSurpriseMedia();
    holdFill.style.width='0%';
    updatePhotoLabel(s);

    if(s.photo && revealedPhotoSlides.has(idx)){
      const media = surpriseMedia[photoSlotForSlide(idx)];
      if(media){
        showSurpriseMedia(media);
        photoBox.classList.add('revealed');
        holdFill.style.width='100%';
      }
    }

    noteText.setAttribute('data-placeholder', s.placeholder);
    noteText.textContent = '';
    scatter(noteGlitter, 24);
    scatter(photoGlitter, 16);

    if(typeof s.kitten === 'number'){
      kittenWrap.classList.remove('hide');
      kittenWrap.innerHTML = kittens[s.kitten];
      kittenWrap.style.animation = 'none';
      kittenWrap.offsetHeight;
      kittenWrap.style.animation = '';
    } else {
      kittenWrap.classList.add('hide');
      kittenWrap.innerHTML = '';
    }

    hint.textContent='';
    nextBtn.disabled=false;
    nextBtn.style.opacity=1;
    backBtn.disabled = (idx === 0);

    if(s.trickNext){
      hint.textContent = s.endButton ? '' : 'tap next like you mean it';
    }
    if(s.delaySeconds){
      let remaining = s.delaySeconds;
      nextBtn.disabled = true;
      nextBtn.style.opacity = .4;
      hint.textContent = `hang on... ${remaining}`;
      const t = setInterval(()=>{
        remaining--;
        if(remaining<=0){
          clearInterval(t);
          nextBtn.disabled=false;
          nextBtn.style.opacity=1;
          hint.textContent='ok, go ahead';
        } else {
          hint.textContent = `hang on... ${remaining}`;
        }
      },1000);
    }

    nextBtn.textContent = s.isLast ? 'the end ♥' : 'next →';
  }

  nextBtn.addEventListener('click', ()=>{
    const s = slides[idx];
    if(nextBtn.disabled) return;

    if(s.trickNext){
      tapCount++;
      if(tapCount < s.trickNext){
        const msgs=['try again','not too fast','almost...','one more','so close','okay, here'];
        hint.textContent = msgs[Math.min(tapCount-1, msgs.length-1)];
        return;
      }
    }

    if(s.isLast){
      hint.textContent='read it again anytime.';
      nextBtn.disabled = true;
      nextBtn.style.opacity = .5;
      return;
    }
    transitionToSlide(idx+1);
  });

  backBtn.addEventListener('click', ()=>{
    if(idx <= 0) return;
    transitionToSlide(idx-1);
  });

  photoBox.addEventListener('click', ()=>{
    const s = slides[idx];
    if(photoBox.classList.contains('revealed') || s.holdReveal) return;
    revealCurrentPhoto();
  });

  // explicit touch handling — mobile browsers can swallow the synthetic click
  // if the page scrolls even slightly during a tap, so handle touch directly too
  let touchMoved = false;
  photoBox.addEventListener('touchstart', ()=>{ touchMoved = false; }, {passive:true});
  photoBox.addEventListener('touchmove', ()=>{ touchMoved = true; }, {passive:true});
  photoBox.addEventListener('touchend', (e)=>{
    const s = slides[idx];
    if(s.holdReveal || touchMoved || photoBox.classList.contains('revealed')) return;
    e.preventDefault();
    revealCurrentPhoto();
  }, {passive:false});

  // press-and-hold reveal
  function startHold(){
    const s = slides[idx];
    if(!s.holdReveal || photoBox.classList.contains('revealed')) return;
    const slot = photoSlotForSlide(idx);
    if(!surpriseMedia[slot]){
      hint.textContent = `add media ${slot + 1} in /photos first`;
      updatePhotoLabel(s);
      return;
    }
    holdProgress = 0;
    holdTimer = setInterval(()=>{
      holdProgress += 4;
      holdFill.style.width = Math.min(holdProgress,100)+'%';
      if(holdProgress>=100){
        clearInterval(holdTimer);
        revealCurrentPhoto();
      }
    }, 40);
  }
  function cancelHold(){
    clearInterval(holdTimer);
    if(!photoBox.classList.contains('revealed')){
      holdProgress = 0;
      holdFill.style.width='0%';
    }
  }
  photoBox.addEventListener('mousedown', startHold);
  photoBox.addEventListener('touchstart', startHold, {passive:true});
  photoBox.addEventListener('mouseup', cancelHold);
  photoBox.addEventListener('mouseleave', cancelHold);
  photoBox.addEventListener('touchend', cancelHold);

  document.getElementById('enterBtn').addEventListener('click', ()=>{
    document.getElementById('landing').classList.add('hide');
    document.getElementById('slides').classList.remove('hide');
    renderSlide();
  });
</script>
</body>
</html>
